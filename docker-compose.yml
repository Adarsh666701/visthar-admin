services:
  admin-backend:
    container_name: visthar-admin-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "4100:4100"
    restart: unless-stopped

  admin-frontend:
    container_name: visthar-admin-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_ADMIN_API_BASE: http://localhost:4100
    ports:
      - "5173:80"
    depends_on:
      - admin-backend
    restart: unless-stopped
